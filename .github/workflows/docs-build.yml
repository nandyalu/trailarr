name: Build and Deploy Docs
on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
  workflow_dispatch:  # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for mkdocs-git-revision-date-localized-plugin

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/pyproject.toml"  # Automatically reads the Python version from pyproject.toml
          # python-version: 3.x

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Copy pyproject to project root
        run: cp backend/pyproject.toml .

      - name: Install Dependencies
        run: uv pip install --no-cache --native-tls --system -r pyproject.toml --group docs

      - name: Build Documentation
        run: zensical build --clean

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true
