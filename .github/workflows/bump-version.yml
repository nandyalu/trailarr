name: Bump Version

on:
  pull_request:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v0.9.5)'
        required: true

jobs:
  bump:
    name: Bump version files and regenerate OpenAPI spec
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # For pull_request: only run if PR title starts with a semver tag, e.g. "v0.9.5 - Some title"
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.pull_request.title, 'v')

    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version_tag }}"
          else
            TITLE="${{ github.event.pull_request.title }}"
            TAG=$(echo "$TITLE" | grep -oP '^v\d+\.\d+\.\d+')
          fi
          if [ -z "$TAG" ]; then
            echo "No valid semver tag found, skipping."
            exit 0
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.head_ref }}

      - name: Bump version in pyproject.toml
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" backend/pyproject.toml

      - name: Bump version in package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --prefix frontend

      - name: Bump APP_VERSION in tasks.json
        run: |
          sed -i "s/\"APP_VERSION\": \"[^\"]*\"/\"APP_VERSION\": \"${{ steps.version.outputs.version }}\"/g" .vscode/tasks.json

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: backend

      - name: Install backend dependencies
        run: uv sync
        working-directory: backend

      - name: Generate OpenAPI spec
        run: |
          APP_VERSION=${{ steps.version.outputs.tag }} PYTHONPATH=$(pwd) uv run python export_openapi.py
        working-directory: backend

      - name: Commit version bump to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pyproject.toml frontend/package.json frontend/package-lock.json \
                  .vscode/tasks.json docs/references/api-docs/openapi.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}" || echo "Nothing to commit"
          git push origin HEAD
