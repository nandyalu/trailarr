@if (authService.isAuthenticated()) {
  <div class="mainroot">
    <header class="topnavbar">
      <!-- Navbar content goes here -->
      <app-topnav></app-topnav>
    </header>
    <div class="mainbody">
      <div class="sidebar">
        <!-- Sidebar content goes here -->
        <app-sidenav></app-sidenav>
      </div>
      <main class="main-content">
        <!-- Main content goes here -->
        @defer (on immediate) {
          <router-outlet></router-outlet>
        } @loading (after 100ms; minimum 2s) {
          <!-- Shows loading indicator while content is loading -->
          <app-load-indicator />
        }
      </main>
    </div>
    <!-- Notifications / toast messages -->
    <app-notifications />
  </div>

  <!-- Session Timing Out Dialog -->
  <dialog #sessionEndingDialog>
    <div class="dialog-content" (click)="$event.stopPropagation()">
      <h2>Extend Session?</h2>
      <p>You were gone for a while, we are about to close your session!</p>
      <p>{{ sessionEndTime() | timeRemaining | async }} remaining</p>
      <div class="loading-container">
        <div class="loading-container-inner">
          <div class="dash first"></div>
          <div class="dash second"></div>
          <div class="dash third"></div>
          <div class="dash fourth"></div>
        </div>
      </div>
      <button class="primary" (click)="extendTime()">Extend Session</button>
    </div>
  </dialog>
} @else {
  <router-outlet></router-outlet>
}
